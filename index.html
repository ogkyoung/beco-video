<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내손안의 환경선생님</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    :root {
        --bg: #f4f8fb;
        --card: #ffffff;
        --line: #d6e4f0;
        --text: #2c3e50;
        --muted: #66788a;
        --blue: #1e88e5;
        --green: #43a047;
        --orange: #fb8c00;
        --blue-soft: #e3f2fd;
        --shadow: 0 12px 32px rgba(31, 74, 125, 0.08);
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        background: var(--bg);
        text-align: center;
        color: var(--text);
    }

    header {
        background: white;
        padding: 25px 0;
        border-bottom: 1px solid #eee;
    }

    header img {
        height: 60px;
        width: auto;
    }

    .container {
        max-width: 480px;
        margin: auto;
        padding: 40px 20px 60px;
    }

    .title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.4;
        word-break: keep-all;
    }

    .subtitle {
        font-size: 1rem;
        color: #666;
        margin-bottom: 40px;
        line-height: 1.6;
        word-break: keep-all;
    }

    .menu-btn {
        width: 100%;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 15px;
        border: none;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
    }

    .menu-btn:active {
        transform: scale(0.97);
    }

    .btn1 {
        background: var(--green);
        color: white;
    }

    .btn2 {
        background: var(--orange);
        color: white;
    }

    .btn3 {
        background: var(--blue);
        color: white;
    }

    .btn-question {
        background: var(--blue-soft);
        color: var(--blue);
        padding: 15px;
        font-size: 1rem;
    }

    .view {
        display: none;
    }

    .view.active {
        display: block;
    }

    .video-box {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        margin-top: 20px;
    }

    .video-box video {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        border-radius: 15px;
        background: #000;
    }

    .back-btn {
        margin-top: 20px;
        display: inline-block;
        color: #888;
        cursor: pointer;
    }

    .input-box,
    .select-box {
        width: 100%;
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        font-size: 1rem;
        box-sizing: border-box;
        font-family: 'Pretendard', sans-serif;
        background: #fff;
    }

    .privacy-note {
        margin: 10px 0 18px;
        font-size: 0.9rem;
        color: #666;
        line-height: 1.5;
        word-break: keep-all;
    }

    .choice-group,
    .question-meta {
        margin-bottom: 16px;
        text-align: left;
    }

    .choice-option {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        font-size: 1rem;
        cursor: pointer;
    }

    #contactFields {
        display: block;
    }

    .upload-wrap {
        margin-bottom: 16px;
        text-align: left;
    }

    .upload-label {
        display: inline-block;
        width: 100%;
        padding: 14px 16px;
        border: 1px dashed #9bbad3;
        border-radius: 12px;
        background: #f8fbfe;
        cursor: pointer;
    }

    .upload-label input {
        display: none;
    }

    .upload-file-name {
        margin-top: 8px;
        font-size: 0.9rem;
        color: #666;
        line-height: 1.4;
        word-break: break-all;
    }

    .admin-wrap {
        text-align: left;
    }

    .admin-title {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 8px;
    }

    .admin-subtitle {
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 20px;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
    }

    .card {
        background: var(--card);
        border-radius: 18px;
        padding: 18px 16px;
        box-shadow: var(--shadow);
    }

    .metric-label {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 8px;
    }

    .metric-value {
        font-size: 1.7rem;
        font-weight: 800;
    }

    .section-card {
        background: var(--card);
        border-radius: 18px;
        padding: 18px 16px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
    }

    .section-title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 12px;
    }

    .list-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #eef2f5;
        font-size: 0.95rem;
    }

    .list-row:last-child {
        border-bottom: none;
    }

    .bar-wrap {
        flex: 1;
        height: 8px;
        background: #edf3f7;
        border-radius: 999px;
        overflow: hidden;
    }

    .bar {
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--blue));
        border-radius: 999px;
    }

    .small {
        font-size: 0.88rem;
        color: var(--muted);
    }

    .tag {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef6ff;
        color: var(--blue);
        font-size: 0.82rem;
        font-weight: 700;
    }

    .complaint-item {
        padding: 14px 0;
        border-bottom: 1px solid #eef2f5;
    }

    .complaint-item:last-child {
        border-bottom: none;
    }

    .complaint-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
    }

    .complaint-title {
        font-weight: 700;
        line-height: 1.4;
    }

    .empty-state {
        color: var(--muted);
        line-height: 1.6;
        padding: 8px 0 2px;
    }

    .dashboard-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
    }

    .dashboard-actions .menu-btn {
        margin-bottom: 0;
        padding: 14px 12px;
        font-size: 0.95rem;
    }

    .highlight {
        background: #fff3e0;
        color: #e65100;
        padding: 2px 8px;
        border-radius: 6px;
        font-weight: 800;
        display: inline-block;
        margin: 2px 0;
    }
</style>
</head>

<body>

<header>
    <img src="logo.jpg" alt="부산환경공단" ondblclick="openAdminLogin()">
</header>

<div class="container">

    <div id="home" class="view active">
        <div class="title">내 손안의 환경선생님</div>
        <div class="subtitle">부산환경공단을 쉽게 알아보세요</div>

        <button class="menu-btn btn1" onclick="playVideo('대표홍보영상.mp4', '부산환경공단이 궁금해')">
            부산환경공단이 궁금해
        </button>

        <button class="menu-btn btn2" onclick="playVideo('자원순환교육용영상.mp4', '소각시설')">
            소각시설
        </button>

        <button class="menu-btn btn3" onclick="playVideo('하수처리교육용영상.mp4', '하수시설')">
            하수시설
        </button>

        <button class="menu-btn btn-question" onclick="goQuestionPage()">
            궁금해요
        </button>
    </div>

    <div id="videoPage" class="view">
        <h2 id="videoTitle"></h2>
        <div class="video-box">
            <video id="player" controls autoplay playsinline></video>
        </div>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>

    <div id="questionPage" class="view">
        <h2>궁금해요</h2>
        <div class="privacy-note">※ 개인정보는 답변을 위한 용도로만 사용됩니다.</div>

        <div class="choice-group">
            <label class="choice-option">
                <input type="radio" name="replyType" value="reply" checked onchange="toggleContactFields()">
                <span>답변 받기 원해요</span>
            </label>
            <label class="choice-option">
                <input type="radio" name="replyType" value="opinion" onchange="toggleContactFields()">
                <span>그냥 의견만 남길게요</span>
            </label>
        </div>

        <div id="contactFields">
            <input type="email" id="email" class="input-box" placeholder="이메일 입력">
            <input type="tel" id="phone" class="input-box" placeholder="핸드폰 번호 입력">
        </div>

        <div class="question-meta">
            <select id="facility" class="select-box">
                <option value="">관련 시설 선택</option>
                <option value="공단 일반">공단 일반</option>
                <option value="소각시설">소각시설</option>
                <option value="하수시설">하수시설</option>
                <option value="기타">기타</option>
            </select>
        </div>

        <textarea id="question" class="input-box" placeholder="궁금한 내용을 작성해주세요" style="height: 120px;"></textarea>

        <div class="upload-wrap">
            <label class="upload-label">
                사진 첨부하기
                <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="showSelectedFileName()">
            </label>
            <div id="fileName" class="upload-file-name">선택된 사진이 없습니다.</div>
        </div>

        <button class="menu-btn btn1" onclick="submitQuestion()">제출하기</button>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>

    <div id="dashboardPage" class="view">
        <div class="admin-wrap">
            <div class="admin-title">관리자 대시보드</div>
            <div class="admin-subtitle">실시간 데이터를 기반으로 자동 분류한 결과입니다.</div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="metric-label">누적 접수</div>
                    <div id="metricTotal" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">오늘 접수</div>
                    <div id="metricToday" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">고위험 건수</div>
                    <div id="metricHighRisk" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">답변 요청</div>
                    <div id="metricNeedReply" class="metric-value">0</div>
                </div>
            </div>

            <div class="dashboard-actions">
                <button class="menu-btn btn1" style="background:#e74c3c; color:white;" onclick="downloadAIReport()">📊 AI 예방 보고서 다운로드</button>
                <button class="menu-btn btn-question" onclick="downloadCsv()">CSV 내보내기</button>
            </div>

            <div class="section-card">
                <div class="section-title">AI 선제 대응 제안</div>
                <div id="insightList" style="line-height:1.6; font-size:0.95rem; color:var(--text); white-space:pre-line;">데이터가 쌓이면 자동으로 대응 제안이 표시됩니다.</div>
            </div>

            <div class="section-card">
                <div class="section-title">월별 민원 종류별 추이</div>
                <canvas id="monthlyChart" style="max-height: 250px;"></canvas>
            </div>

            <div class="section-card">
                <div class="section-title">지역별 민원 분포</div>
                <div id="regionStats" class="empty-state">데이터 없음</div>
            </div>

            <div class="section-card">
                <div class="section-title">민원 종류별 실시간 분류</div>
                <div id="typeStats" class="empty-state">데이터 없음</div>
            </div>

            <div class="section-card">
                <div class="section-title">최근 접수 내역</div>
                <div id="complaintList" class="empty-state">내역 없음</div>
            </div>
        </div>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>
</div>

<script>
/**
 * 부산환경공단 AI 민원 예측 시스템 (Morning Functional Restoration)
 */

const ADMIN_PASSWORD = '7777';
const SUPABASE_URL = 'https://epzhhgavlxixtjbbmaxt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwemhoZ2F2bHhpeHRqYmJtYXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTE3OTEsImV4cCI6MjA5MjIyNzc5MX0.a2B5S4rdWu9bszoGr6WytyT3JkYpLru85FydaltBfz0';

function switchView(viewId) {
    const pages = ['home', 'videoPage', 'questionPage', 'dashboardPage'];
    pages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = (id === viewId) ? 'block' : 'none';
    });
}

function playVideo(file, title) {
    switchView('videoPage');
    const player = document.getElementById('player');
    if (player) {
        player.src = file;
        player.play().catch(() => {});
    }
    const titleEl = document.getElementById('videoTitle');
    if (titleEl) titleEl.innerText = title;
}

function goHome() {
    switchView('home');
    const player = document.getElementById('player');
    if (player) {
        player.pause();
        player.src = '';
    }
}

function goQuestionPage() { switchView('questionPage'); }

async function goDashboard() {
    await renderDashboard();
    switchView('dashboardPage');
}

function openAdminLogin() {
    const pw = prompt('비밀번호를 입력해주세요.');
    if (pw === ADMIN_PASSWORD) goDashboard();
    else if (pw !== null) alert('비밀번호가 틀렸습니다.');
}

function toggleContactFields() {
    const selected = document.querySelector('input[name="replyType"]:checked');
    const contactFields = document.getElementById('contactFields');
    if (contactFields) contactFields.style.display = (selected && selected.value === 'reply') ? 'block' : 'none';
}

function showSelectedFileName() {
    const file = document.getElementById('photoInput').files[0];
    const nameEl = document.getElementById('fileName');
    if (nameEl) nameEl.innerText = file ? '첨부된 사진: ' + file.name : '선택된 사진이 없습니다.';
}

async function fetchComplaints() {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/complaints?select=*&apikey=${SUPABASE_ANON_KEY}`, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Cache-Control': 'no-cache'
            }
        });

        const text = await response.text();
        console.log("수파베이스 응답 원본:", text);

        if (!response.ok) throw new Error(text);

        const data = JSON.parse(text);
        return data || [];
    } catch (e) {
        console.error("데이터 동기화 오류:", e);
        return [];
    }
}

function classifyType(text) {
    const q = (text || '').toLowerCase();
    if (q.includes('냄새') || q.includes('악취')) return '악취/대기';
    if (q.includes('소음') || q.includes('진동')) return '소음/진동';
    if (q.includes('하수') || q.includes('오수')) return '하수/수질';
    return '일반 문의';
}

function riskLevel(q) {
    const text = (q || '').toLowerCase();
    if (text.includes('긴급') || text.includes('위험')) return '고위험';
    if (text.includes('지속')) return '중간';
    return '일반';
}

function inferRegion(q) {
    const text = (q || '').toLowerCase();
    if (text.includes('강서')) return '강서구';
    if (text.includes('해운대')) return '해운대구';
    if (text.includes('사하')) return '사하구';
    if (text.includes('수영')) return '수영구';
    if (text.includes('남구')) return '남구';
    if (text.includes('영도')) return '영도구';
    return '기타 지역';
}

let myChart = null;

async function renderDashboard() {
    const data = await fetchComplaints();

    if (!data || !data.length) {
        document.getElementById('metricTotal').innerText = '-';
        document.getElementById('metricToday').innerText = '-';
        document.getElementById('metricHighRisk').innerText = '-';
        document.getElementById('metricNeedReply').innerText = '-';
        document.getElementById('insightList').innerText = '데이터 수집 중입니다';
        return;
    }

    const today = new Date().toDateString();
    document.getElementById('metricTotal').innerText = data.length;
    document.getElementById('metricToday').innerText = data.filter(i => {
        const d = i.created_at || i.createdAt;
        return d && new Date(d).toDateString() === today;
    }).length;
    const highRiskCount = data.filter(i => riskLevel(i.question) === '고위험').length;
    document.getElementById('metricHighRisk').innerText = highRiskCount;
    document.getElementById('metricNeedReply').innerText = data.filter(i => (i.reply_type || i.replyType) === 'reply').length;

    // 통계 및 분석 데이터 생성
    const stats = { type: {}, region: {} };
    const monthlyData = {};
    let nightComplaints = 0;

    data.forEach(i => {
        const tp = classifyType(i.question);
        stats.type[tp] = (stats.type[tp] || 0) + 1;

        const reg = inferRegion(i.question);
        stats.region[reg] = (stats.region[reg] || 0) + 1;

        const date = new Date(i.created_at || i.createdAt);
        const m = (date.getMonth() + 1) + '월';
        if (!monthlyData[m]) monthlyData[m] = { '소음/진동': 0, '악취/대기': 0, '일반 문의': 0, '하수/수질': 0 };
        monthlyData[m][tp]++;

        if (date.getHours() >= 18) nightComplaints++;
    });

    document.getElementById('insightList').innerHTML = generateInsight(monthlyData, nightComplaints, data.length, highRiskCount);
    updateMonthlyChart(monthlyData);

    const renderRows = (id, obj) => {
        const el = document.getElementById(id);
        if (!el) return;
        const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
        const tot = data.length || 1;
        el.innerHTML = sorted.map(([k,v]) => `
            <div class="list-row">
                <div style="min-width: 82px;">${k}</div>
                <div class="bar-wrap"><div class="bar" style="width: ${(v/tot)*100}%"></div></div>
                <div>${v}건</div>
            </div>
        `).join('') || '<div class="empty-state">데이터 없음</div>';
    };
    renderRows('typeStats', stats.type);
    renderRows('regionStats', stats.region);

    document.getElementById('complaintList').innerHTML = data.slice(-10).reverse().map(i => `
        <div class="complaint-item">
            <div class="complaint-head">
                <div class="complaint-title">${classifyType(i.question)}</div>
                <div class="tag">${i.status || '접수'}</div>
            </div>
            <div class="small">${new Date(i.created_at || i.createdAt).toLocaleString()}</div>
            <div style="margin-top:8px;">${i.question}</div>
        </div>
    `).join('') || '<div class="empty-state">내역 없음</div>';
}

function generateInsight(monthlyData, nightCount, totalCount, highRiskCount) {
    const months = Object.entries(monthlyData);
    if (!months.length) return "데이터 수집 중입니다.";

    const getTotal = (mObj) => Object.values(mObj).reduce((a, b) => a + b, 0);
    const getTopType = (mObj) => Object.entries(mObj).sort((a, b) => b[1] - a[1])[0][0];

    const sorted = months.sort((a, b) => getTotal(b[1]) - getTotal(a[1]));
    const maxMonth = sorted[0][0];

    let insight = `🚩 <span class="highlight">${maxMonth}에 민원이 집중되었습니다.</span> 선제 대응이 필요합니다.<br>`;
    insight += `분석 결과, 현재 <span class="highlight">고위험 ${highRiskCount}건</span>이 포착되었습니다.<br>`;
    
    if (nightCount > totalCount * 0.3) {
        insight += `특히 <span class="highlight">야간 민원 비중</span>이 높으므로 야간 관리 체계 강화가 권장됩니다.`;
    } else {
        insight += `주요 유형은 '${getTopType(monthlyData[maxMonth])}'이며 해당 시기 집중 점검이 필요합니다.`;
    }

    return insight;
}

function updateMonthlyChart(monthlyData) {
    const canvas = document.getElementById('monthlyChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const labels = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
    
    const datasets = [
        { label: '소음/진동', data: labels.map(m => (monthlyData[m] || {})['소음/진동'] || 0), backgroundColor: '#fb8c00' },
        { label: '악취/대기', data: labels.map(m => (monthlyData[m] || {})['악취/대기'] || 0), backgroundColor: '#e74c3c' },
        { label: '하수/수질', data: labels.map(m => (monthlyData[m] || {})['하수/수질'] || 0), backgroundColor: '#1e88e5' },
        { label: '일반 문의', data: labels.map(m => (monthlyData[m] || {})['일반 문의'] || 0), backgroundColor: '#43a047' }
    ];

    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { stacked: true },
            scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
        }
    });
}

async function submitQuestion() {
    const q = document.getElementById('question').value.trim();
    if (!q) return alert('내용을 입력해 주세요.');

    const fileInput = document.getElementById('photoInput');
    const file = fileInput.files[0];
    let photoName = '';

    if (file) {
        photoName = `${Date.now()}_${file.name}`;
        try {
            const res = await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${photoName}`, {
                method: 'POST',
                headers: { 
                    'apikey': SUPABASE_ANON_KEY, 
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': file.type 
                },
                body: file
            });
        } catch(e) { console.error('Photo Upload Error:', e); }
    }

    const body = {
        reply_type: document.querySelector('input[name="replyType"]:checked').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        facility: document.getElementById('facility').value,
        question: q,
        photo_name: photoName,
        status: '접수'
    };

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/complaints`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify(body)
        });
        if (res.ok) { 
            alert('민원이 정상적으로 접수되었습니다.'); 
            goHome(); 
            document.getElementById('question').value = '';
            fileInput.value = '';
            document.getElementById('fileName').innerText = '선택된 사진 없음';
        }
    } catch(e) { alert('접수 오류'); }
}

        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'data.csv'; a.click();
    });
}
