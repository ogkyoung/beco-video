<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내손안의 환경선생님 (서버연동형)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --bg: #f4f8fb; --card: #ffffff; --line: #d6e4f0; --text: #2c3e50; --muted: #66788a; --blue: #1e88e5; --green: #43a047; --orange: #fb8c00; --shadow: 0 12px 32px rgba(31, 74, 125, 0.08); }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--text); }
        header { background: white; padding: 25px 0; border-bottom: 1px solid #eee; }
        header img { height: 50px; cursor: pointer; }
        .container { max-width: 480px; margin: auto; padding: 40px 20px; }
        .menu-btn { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; color: white; transition: 0.2s; }
        .menu-btn:active { transform: scale(0.98); }
        .btn1 { background: var(--green); } .btn2 { background: var(--orange); } .btn3 { background: var(--blue); }
        .view { display: none; } .view.active { display: block; }
        .input-box, .select-box { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 12px; border: 1px solid #ccc; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .card { background: white; border-radius: 18px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 15px; text-align: left; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef6ff; color: var(--blue); font-size: 0.8rem; font-weight: 700; margin-right: 5px; }
        .back-btn { margin-top: 20px; color: #888; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="부산환경공단" ondblclick="openAdminLogin()">
</header>

<div class="container">
    <div id="home" class="view active">
        <h2 style="font-weight:800;">내 손안의 환경선생님</h2>
        <p style="color:#666; margin-bottom:40px;">부산환경공단을 쉽게 알아보세요</p>
        <button class="menu-btn btn1" onclick="alert('준비 중인 기능입니다.')">부산환경공단이 궁금해</button>
        <button class="menu-btn btn2" onclick="alert('준비 중인 기능입니다.')">소각시설 안내</button>
        <button class="menu-btn btn3" onclick="alert('준비 중인 기능입니다.')">하수시설 안내</button>
        <button class="menu-btn" style="background:#e3f2fd; color:#1e88e5;" onclick="switchView('questionPage')">궁금해요 (민원접수)</button>
    </div>

    <div id="questionPage" class="view">
        <h3 style="margin-bottom:20px;">문의 및 의견 접수</h3>
        <select id="facility" class="select-box">
            <option value="공단 일반">공단 일반</option>
            <option value="소각시설">소각시설</option>
            <option value="하수시설">하수시설</option>
        </select>
        <input type="email" id="email" class="input-box" placeholder="답변받을 이메일 주소">
        <input type="tel" id="phone" class="input-box" placeholder="핸드폰 번호 (예: 010-1234-5678)">
        <textarea id="question" class="input-box" style="height:150px;" placeholder="문의하실 내용을 입력해주세요."></textarea>
        <button class="menu-btn btn1" onclick="submitToSupabase()">서버로 제출하기</button>
        <div class="back-btn" onclick="switchView('home')">← 처음으로</div>
    </div>

    <div id="dashboardPage" class="view">
        <h3 style="text-align:left; margin-bottom:20px;">관리자 대시보드</h3>
        <div id="complaintList" style="text-align:left;">데이터를 불러오는 중...</div>
        <div class="back-btn" onclick="switchView('home')">← 처음으로</div>
    </div>
</div>

<script>
    // 2. 수파베이스 설정 (이미 API 키 반영 완료)
    const SUPABASE_URL = 'https://epzhhgavlxixtjbbmaxt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwemhoZ2F2bHhpeHRqYmJtYXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTE3OTEsImV4cCI6MjA5MjIyNzc5MX0.a2B5S4rdWu9bszoGr6WytyT3JkYpLru85FydaltBfz0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 3. 서버에 데이터 저장하기
    async function submitToSupabase() {
        const content = document.getElementById('question').value;
        const facility = document.getElementById('facility').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;

        if(!content) return alert('내용을 입력하세요.');

        const { error } = await _supabase
            .from('complaints')
            .insert([{ 
                content: content, 
                facility: facility, 
                email: email,
                phone: phone, 
                status: '접수',
                created_at: new Date().toISOString() 
            }]);

        if (error) {
            alert('오류 발생: ' + error.message);
        } else {
            alert('✅ 서버에 안전하게 저장되었습니다!');
            document.getElementById('question').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            switchView('home');
        }
    }

    // 4. 서버에서 데이터 불러오기 (관리자용)
    async function loadDashboard() {
        const { data, error } = await _supabase
            .from('complaints')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return;

        const listHtml = data.map(item => `
            <div class="card">
                <div><span class="tag">${item.status}</span> <b>${item.facility}</b></div>
                <div style="margin-top:10px;">${item.content}</div>
                <div style="font-size:0.8rem; color:#888; margin-top:10px; border-top:1px dotted #ccc; padding-top:8px;">
                    📅 ${new Date(item.created_at).toLocaleString()}<br>
                    📧 ${item.email || '미입력'} | 📱 ${item.phone || '미입력'}
                </div>
            </div>
        `).join('');
        
        document.getElementById('complaintList').innerHTML = listHtml || "접수된 내역이 없습니다.";
    }

    function openAdminLogin() {
        const pw = prompt('관리자 비밀번호를 입력하세요 (1234)');
        if(pw === '1234') {
            switchView('dashboardPage');
            loadDashboard();
        }
    }
</script>

</body>
</html>
