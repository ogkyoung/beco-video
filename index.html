<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내손안의 환경선생님</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
    body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        background: #f4f8fb;
        text-align: center;
        color: #2c3e50;
    }

    header {
        background: white;
        padding: 25px 0;
        border-bottom: 1px solid #eee;
    }

    header img {
        height: 60px;
        width: auto;
    }

    .container {
        max-width: 480px;
        margin: auto;
        padding: 40px 20px;
    }

    .title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.4;
        word-break: keep-all;
    }

    .subtitle {
        font-size: 1rem;
        color: #666;
        margin-bottom: 40px;
        line-height: 1.6;
        word-break: keep-all;
    }

    .menu-btn {
        width: 100%;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 15px;
        border: none;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
    }

    .menu-btn:active {
        transform: scale(0.97);
    }

    .btn1 {
        background: #1e88e5;
        color: white;
    }

    .btn2 {
        background: #43a047;
        color: white;
    }

    .btn3 {
        background: #fb8c00;
        color: white;
    }

    .video-view {
        display: none;
    }

    .video-box {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        margin-top: 20px;
    }

    .video-box video {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        border-radius: 15px;
        background: #000;
    }

    .back-btn {
        margin-top: 20px;
        display: inline-block;
        color: #888;
        cursor: pointer;
    }
</style>
</head>

<body>

<header>
    <img src="logo.jpg" alt="부산환경공단">
</header>

<div class="container">

    <div id="home">
        <div class="title">내 손안의 환경선생님</div>
        <div class="subtitle">부산환경공단을 쉽게 알아보세요</div>

        <button class="menu-btn btn1" onclick="playVideo('대표홍보영상.mp4', '부산환경공단이 궁금해')">
            부산환경공단이 궁금해
        </button>

        <button class="menu-btn btn2" onclick="playVideo('자원순환교육용영상.mp4', '소각시설')">
            소각시설
        </button>

        <button class="menu-btn btn3" onclick="playVideo('하수처리교육용영상.mp4', '하수시설')">
            하수시설
        </button>
    </div>

    <div id="videoPage" class="video-view">
        <h2 id="videoTitle"></h2>

        <div class="video-box">
            <video id="player" controls autoplay playsinline></video>
        </div>

        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>

</div>

<script>
function playVideo(file, title) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('videoPage').style.display = 'block';

    const player = document.getElementById('player');
    player.src = file;
    player.play();

    document.getElementById('videoTitle').innerText = title;
}

function goHome() {
    document.getElementById('videoPage').style.display = 'none';
    document.getElementById('home').style.display = 'block';

    const player = document.getElementById('player');
    player.pause();
    player.src = "";
}
</script>

</body>
</html>
