<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내손안의 환경선생님 (최종연동형)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>

    <style>
        :root { --bg: #f4f8fb; --card: #ffffff; --text: #2c3e50; --blue: #1e88e5; --green: #43a047; --orange: #fb8c00; --shadow: 0 12px 32px rgba(31, 74, 125, 0.08); }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--text); }
        header { background: white; padding: 20px 0; border-bottom: 1px solid #eee; }
        header img { height: 45px; cursor: pointer; }
        .container { max-width: 480px; margin: auto; padding: 30px 20px; }
        .menu-btn { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; color: white; }
        .btn1 { background: var(--green); } .btn2 { background: var(--orange); } .btn3 { background: var(--blue); }
        .view { display: none; } .view.active { display: block; }
        .input-box, .select-box { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 12px; border: 1px solid #ccc; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .card { background: white; border-radius: 18px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 15px; text-align: left; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef6ff; color: var(--blue); font-size: 0.8rem; font-weight: 700; margin-right: 5px; }
        .back-btn { margin-top: 20px; color: #888; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="로고" ondblclick="openAdminLogin()">
</header>

<div class="container">
    <div id="home" class="view active">
        <h2>내 손안의 환경선생님</h2>
        <p>부산환경공단을 쉽게 알아보세요</p>
        <button class="menu-btn btn1" onclick="alert('준비 중인 기능입니다.')">환경공단 가이드</button>
        <button class="menu-btn btn2" onclick="alert('준비 중인 기능입니다.')">소각시설 안내</button>
        <button class="menu-btn btn3" onclick="alert('준비 중인 기능입니다.')">하수시설 안내</button>
        <button class="menu-btn" style="background:#e3f2fd; color:#1e88e5;" onclick="switchView('questionPage')">궁금해요 (민원접수)</button>
    </div>

    <div id="questionPage" class="view">
        <h3>민원 및 의견 접수</h3>
        <select id="facility" class="select-box">
            <option value="공단 일반">공단 일반</option>
            <option value="소각시설">소각시설</option>
            <option value="하수시설">하수시설</option>
        </select>
        <input type="email" id="email" class="input-box" placeholder="이메일 주소">
        <input type="tel" id="phone" class="input-box" placeholder="핸드폰 번호 (예: 010-1234-5678)">
        <textarea id="question" class="input-box" style="height:150px;" placeholder="문의하실 내용을 입력해주세요."></textarea>
        <button class="menu-btn btn1" id="submitBtn" onclick="submitToSupabase()">서버로 제출하기</button>
        <div class="back-btn" onclick="switchView('home')">← 처음으로</div>
    </div>

    <div id="dashboardPage" class="view">
        <h3 style="text-align:left;">관리자 대시보드</h3>
        <div id="complaintList" style="text-align:left;">데이터를 불러오는 중...</div>
        <div class="back-btn" onclick="switchView('home')">← 처음으로</div>
    </div>
</div>
