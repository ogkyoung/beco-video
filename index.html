<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내손안의 환경선생님</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
    :root {
        --bg: #f4f8fb;
        --card: #ffffff;
        --line: #d6e4f0;
        --text: #2c3e50;
        --muted: #66788a;
        --blue: #1e88e5;
        --green: #43a047;
        --orange: #fb8c00;
        --blue-soft: #e3f2fd;
        --shadow: 0 12px 32px rgba(31, 74, 125, 0.08);
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        background: var(--bg);
        text-align: center;
        color: var(--text);
    }

    header {
        background: white;
        padding: 25px 0;
        border-bottom: 1px solid #eee;
    }

    header img {
        height: 60px;
        width: auto;
    }

    .container {
        max-width: 480px;
        margin: auto;
        padding: 40px 20px 60px;
    }

    .title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.4;
        word-break: keep-all;
    }

    .subtitle {
        font-size: 1rem;
        color: #666;
        margin-bottom: 40px;
        line-height: 1.6;
        word-break: keep-all;
    }

    .menu-btn {
        width: 100%;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 15px;
        border: none;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
    }

    .menu-btn:active {
        transform: scale(0.97);
    }

    .btn1 {
        background: var(--green);
        color: white;
    }

    .btn2 {
        background: var(--orange);
        color: white;
    }

    .btn3 {
        background: var(--blue);
        color: white;
    }

    .btn-question {
        background: var(--blue-soft);
        color: var(--blue);
        padding: 15px;
        font-size: 1rem;
    }

    .view {
        display: none;
    }

    .view.active {
        display: block;
    }

    .video-box {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        margin-top: 20px;
    }

    .video-box video {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        border-radius: 15px;
        background: #000;
    }

    .back-btn {
        margin-top: 20px;
        display: inline-block;
        color: #888;
        cursor: pointer;
    }

    .input-box,
    .select-box {
        width: 100%;
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        font-size: 1rem;
        box-sizing: border-box;
        font-family: 'Pretendard', sans-serif;
        background: #fff;
    }

    .privacy-note {
        margin: 10px 0 18px;
        font-size: 0.9rem;
        color: #666;
        line-height: 1.5;
        word-break: keep-all;
    }

    .choice-group,
    .question-meta {
        margin-bottom: 16px;
        text-align: left;
    }

    .choice-option {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        font-size: 1rem;
        cursor: pointer;
    }

    #contactFields {
        display: block;
    }

    .upload-wrap {
        margin-bottom: 16px;
        text-align: left;
    }

    .upload-label {
        display: inline-block;
        width: 100%;
        padding: 14px 16px;
        border: 1px dashed #9bbad3;
        border-radius: 12px;
        background: #f8fbfe;
        cursor: pointer;
    }

    .upload-label input {
        display: none;
    }

    .upload-file-name {
        margin-top: 8px;
        font-size: 0.9rem;
        color: #666;
        line-height: 1.4;
        word-break: break-all;
    }

    .admin-wrap {
        text-align: left;
    }

    .admin-title {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 8px;
    }

    .admin-subtitle {
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 20px;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
    }

    .card {
        background: var(--card);
        border-radius: 18px;
        padding: 18px 16px;
        box-shadow: var(--shadow);
    }

    .metric-label {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 8px;
    }

    .metric-value {
        font-size: 1.7rem;
        font-weight: 800;
    }

    .section-card {
        background: var(--card);
        border-radius: 18px;
        padding: 18px 16px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
    }

    .section-title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 12px;
    }

    .list-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #eef2f5;
        font-size: 0.95rem;
    }

    .list-row:last-child {
        border-bottom: none;
    }

    .bar-wrap {
        flex: 1;
        height: 8px;
        background: #edf3f7;
        border-radius: 999px;
        overflow: hidden;
    }

    .bar {
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--blue));
        border-radius: 999px;
    }

    .small {
        font-size: 0.88rem;
        color: var(--muted);
    }

    .tag {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef6ff;
        color: var(--blue);
        font-size: 0.82rem;
        font-weight: 700;
    }

    .complaint-item {
        padding: 14px 0;
        border-bottom: 1px solid #eef2f5;
    }

    .complaint-item:last-child {
        border-bottom: none;
    }

    .complaint-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
    }

    .complaint-title {
        font-weight: 700;
        line-height: 1.4;
    }

    .empty-state {
        color: var(--muted);
        line-height: 1.6;
        padding: 8px 0 2px;
    }

    .dashboard-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
    }

    .dashboard-actions .menu-btn {
        margin-bottom: 0;
        padding: 14px 12px;
        font-size: 0.95rem;
    }
</style>
</head>

<body>

<header>
    <img src="logo.jpg" alt="부산환경공단" ondblclick="openAdminLogin()">
</header>

<div class="container">

    <div id="home" class="view active">
        <div class="title">내 손안의 환경선생님</div>
        <div class="subtitle">부산환경공단을 쉽게 알아보세요</div>

        <button class="menu-btn btn1" onclick="playVideo('대표홍보영상.mp4', '부산환경공단이 궁금해')">
            부산환경공단이 궁금해
        </button>

        <button class="menu-btn btn2" onclick="playVideo('자원순환교육용영상.mp4', '소각시설')">
            소각시설
        </button>

        <button class="menu-btn btn3" onclick="playVideo('하수처리교육용영상.mp4', '하수시설')">
            하수시설
        </button>

        <button class="menu-btn btn-question" onclick="goQuestionPage()">
            궁금해요
        </button>
    </div>

    <div id="videoPage" class="view">
        <h2 id="videoTitle"></h2>
        <div class="video-box">
            <video id="player" controls autoplay playsinline></video>
        </div>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>

    <div id="questionPage" class="view">
        <h2>궁금해요</h2>
        <div class="privacy-note">※ 개인정보는 답변을 위한 용도로만 사용됩니다.</div>

        <div class="choice-group">
            <label class="choice-option">
                <input type="radio" name="replyType" value="reply" checked onchange="toggleContactFields()">
                <span>답변 받기 원해요</span>
            </label>
            <label class="choice-option">
                <input type="radio" name="replyType" value="opinion" onchange="toggleContactFields()">
                <span>그냥 의견만 남길게요</span>
            </label>
        </div>

        <div id="contactFields">
            <input type="email" id="email" class="input-box" placeholder="이메일 입력">
            <input type="tel" id="phone" class="input-box" placeholder="핸드폰 번호 입력">
        </div>

        <div class="question-meta">
            <select id="facility" class="select-box">
                <option value="">관련 시설 선택</option>
                <option value="공단 일반">공단 일반</option>
                <option value="소각시설">소각시설</option>
                <option value="하수시설">하수시설</option>
                <option value="기타">기타</option>
            </select>
        </div>

        <textarea id="question" class="input-box" placeholder="궁금한 내용을 작성해주세요" style="height: 120px;"></textarea>

        <div class="upload-wrap">
            <label class="upload-label">
                사진 첨부하기
                <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="showSelectedFileName()">
            </label>
            <div id="fileName" class="upload-file-name">선택된 사진이 없습니다.</div>
        </div>

        <button class="menu-btn btn1" onclick="submitQuestion()">제출하기</button>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>

    <div id="dashboardPage" class="view">
        <div class="admin-wrap">
            <div class="admin-title">관리자 대시보드</div>
            <div class="admin-subtitle">실시간 데이터를 기반으로 자동 분류한 결과입니다.</div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="metric-label">누적 접수</div>
                    <div id="metricTotal" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">오늘 접수</div>
                    <div id="metricToday" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">고위험 건수</div>
                    <div id="metricHighRisk" class="metric-value">0</div>
                </div>
                <div class="card">
                    <div class="metric-label">답변 요청</div>
                    <div id="metricNeedReply" class="metric-value">0</div>
                </div>
            </div>

            <div class="dashboard-actions">
                <button class="menu-btn btn1" style="background:#e74c3c; color:white;" onclick="downloadAIReport()">📊 AI 예방 보고서 다운로드</button>
                <button class="menu-btn btn-question" onclick="downloadCsv()">CSV 내보내기</button>
            </div>

            <div class="section-card">
                <div class="section-title">AI 선제 대응 제안</div>
                <div id="insightList" class="empty-state">데이터가 쌓이면 자동으로 대응 제안이 표시됩니다.</div>
            </div>

            <div class="section-card">
                <div class="section-title">지역별 민원 분포</div>
                <div id="regionStats" class="empty-state">데이터 없음</div>
            </div>

            <div class="section-card">
                <div class="section-title">시간대별 민원 분포</div>
                <div id="timeStats" class="empty-state">데이터 없음</div>
            </div>

            <div class="section-card">
                <div class="section-title">민원 종류별 분류</div>
                <div id="typeStats" class="empty-state">데이터 없음</div>
            </div>

            <div class="section-card">
                <div class="section-title">최근 접수 내역</div>
                <div id="complaintList" class="empty-state">내역 없음</div>
            </div>
        </div>
        <div class="back-btn" onclick="goHome()">← 처음으로</div>
    </div>
</div>

<script>
/**
 * 부산환경공단 AI 민원 예측 시스템 (사용자 지정 오리지널 형식 복구)
 */

const ADMIN_PASSWORD = '7777';
const SUPABASE_URL = 'https://epzhhgavlxixtjbbmaxt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwemhoZ2F2bHhpeHRqYmJtYXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTE3OTEsImV4cCI6MjA5MjIyNzc5MX0.a2B5S4rdWu9bszoGr6WytyT3JkYpLru85FydaltBfz0';

function switchView(viewId) {
    const pages = ['home', 'videoPage', 'questionPage', 'dashboardPage'];
    pages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = (id === viewId) ? 'block' : 'none';
    });
}

function playVideo(file, title) {
    switchView('videoPage');
    const player = document.getElementById('player');
    if (player) {
        player.src = file;
        player.play().catch(() => {});
    }
    const titleEl = document.getElementById('videoTitle');
    if (titleEl) titleEl.innerText = title;
}

function goHome() {
    switchView('home');
    const player = document.getElementById('player');
    if (player) {
        player.pause();
        player.src = '';
    }
}

function goQuestionPage() { switchView('questionPage'); }

async function goDashboard() {
    await renderDashboard();
    switchView('dashboardPage');
}

function openAdminLogin() {
    const pw = prompt('비밀번호?');
    if (pw === ADMIN_PASSWORD) goDashboard();
    else if (pw !== null) alert('비밀번호가 틀렸습니다.');
}

function toggleContactFields() {
    const selected = document.querySelector('input[name="replyType"]:checked');
    const contactFields = document.getElementById('contactFields');
    if (contactFields) contactFields.style.display = (selected && selected.value === 'reply') ? 'block' : 'none';
}

function showSelectedFileName() {
    const file = document.getElementById('photoInput').files[0];
    const nameEl = document.getElementById('fileName');
    if (nameEl) nameEl.innerText = file ? '첨부된 사진: ' + file.name : '선택된 사진이 없습니다.';
}

// 2. 수파베이스 실시간 데이터 연동 (최소 정예 호출 방식 - 0 현상 방지)
async function fetchComplaints() {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/complaints?select=*&apikey=${SUPABASE_ANON_KEY}`, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        if (!response.ok) throw new Error('Supabase fetch failed');
        return await response.json();
    } catch (e) {
        console.error("데이터 동기화 오류:", e);
        return [];
    }
}

function classifyType(text) {
    const q = (text || '').toLowerCase();
    if (q.includes('냄새') || q.includes('악취')) return '악취/대기';
    if (q.includes('소음') || q.includes('진동')) return '소음/진동';
    if (q.includes('하수') || q.includes('오수')) return '하수/수질';
    return '일반 문의';
}

function evaluateRisk(text) {
    const q = (text || '').toLowerCase();
    if (q.includes('긴급') || q.includes('위험') || q.includes('심각')) return '높음';
    return '보통';
}

async function renderDashboard() {
    const data = await fetchComplaints();
    const today = new Date().toDateString();

    document.getElementById('metricTotal').innerText = data.length;
    document.getElementById('metricToday').innerText = data.filter(i => new Date(i.created_at || i.createdAt).toDateString() === today).length;
    document.getElementById('metricHighRisk').innerText = data.filter(i => evaluateRisk(i.question) === '높음').length;
    document.getElementById('metricNeedReply').innerText = data.filter(i => (i.reply_type || i.replyType) === 'reply').length;

    // 대조군 통계 계산
    const stats = { reg: {}, time: {}, type: {} };
    data.forEach(i => {
        const tp = classifyType(i.question);
        stats.type[tp] = (stats.type[tp] || 0) + 1;
        // ... 기타 통계는 추후 필요시 확장
    });

    const renderRows = (id, obj) => {
        const el = document.getElementById(id);
        const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
        const tot = data.length || 1;
        el.innerHTML = sorted.map(([k,v]) => `
            <div class="list-row">
                <div style="min-width: 82px;">${k}</div>
                <div class="bar-wrap"><div class="bar" style="width: ${(v/tot)*100}%"></div></div>
                <div>${v}건</div>
            </div>
        `).join('') || '<div class="empty-state">데이터 없음</div>';
    };
    renderRows('typeStats', stats.type);

    document.getElementById('complaintList').innerHTML = data.slice(-10).reverse().map(i => `
        <div class="complaint-item">
            <div class="complaint-head">
                <div class="complaint-title">${classifyType(i.question)}</div>
                <div class="tag">${i.status || '접수'}</div>
            </div>
            <div class="small">${new Date(i.created_at || i.createdAt).toLocaleString()}</div>
            <div style="margin-top:8px;">${i.question}</div>
        </div>
    `).join('') || '<div class="empty-state">내역 없음</div>';
}

async function submitQuestion() {
    const q = document.getElementById('question').value.trim();
    if (!q) return alert('내용을 입력해 주세요.');

    const file = document.getElementById('photoInput').files[0];
    let photoName = '';

    if (file) {
        photoName = `${Date.now()}_${file.name}`;
        try {
            await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${photoName}`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                body: file
            });
        } catch(e) { console.error('Photo Upload Failed'); }
    }

    const body = {
        reply_type: document.querySelector('input[name="replyType"]:checked').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        facility: document.getElementById('facility').value,
        question: q,
        photo_name: photoName,
        status: '접수'
    };

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/complaints`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify(body)
        });
        if (res.ok) { 
            alert('민원이 정상적으로 접수되었습니다.'); 
            goHome(); 
            document.getElementById('question').value = '';
            document.getElementById('photoInput').value = '';
            document.getElementById('fileName').innerText = '선택된 사진 없음';
        }
    } catch(e) { alert('접수 오류'); }
}

async function downloadAIReport() {
    const data = await fetchComplaints();
    if (!data.length) return alert('분석할 데이터가 없습니다.');
    const today = new Date().toISOString().split('T')[0];
    const html = `<html><body style="font-family:sans-serif; padding:40px;">
        <h1>AI 민원 분석 보고서</h1>
        <p>총 민원 건수: ${data.length}</p>
        <hr>
        <p>생성일자: ${today}</p>
    </body></html>`;
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([html], {type:'text/html'})); a.download=`Report_${today}.html`; a.click();
}

function downloadCsv() {
    fetchComplaints().then(data => {
        if (!data.length) return;
        const csv = "\uFEFF일시,내용,시설\n" + data.map(i => `${i.created_at || i.createdAt},"${i.question}","${i.facility}"`).join("\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'data.csv'; a.click();
    });
}

toggleContactFields();
</script>
</body>
</html>
